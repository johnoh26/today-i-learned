title: "Today I Learned"
description: "Daily notes on tech, investing, and life — inspired by Haruki Murakami's writing habit and Charlie Munger's pursuit of lifelong learning."
url: "https://johnoh26.github.io"
baseurl: "/today-i-learned"
repository: "johnoh26/today-i-learned"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"

locale: "en-US"
title_separator: "-"
words_per_minute: 200
search: true
search_full_content: true

author:
  name: "John Oh"
  bio: "Software engineer. Documenting the journey."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/johnoh26"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/johnoh26/today-i-learned"

include:
  - .htaccess
  - _pages

exclude:
  - vendor
  - .bundle
  - .sass-cache
  - Gemfile.lock

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..6

permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: /page:num/
timezone: America/New_York

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
